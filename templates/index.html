<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Home Control</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header"></div>
        <button class="icon-btn" onclick="toggleSidebar()">✕</button>
        <nav class="sidebar-nav">
            <button class="nav-item" onclick="profile()">Profile</button>
            <button class="nav-item" onclick="settings()">Settings</button>
            <button class="nav-item" onclick="logout()">Logout</button>

        </nav>
    </aside>

    <div class="container">

        <header class="main-header">
            <div class="header-content">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>

                <h1>MSHome</h1>
                <div class="status-badge">
                    <span id="active-count">0</span> Active Devices
                </div>
            </div>
    </div>
    </header>

    <main class="content-wrapper">
        <div id="room-nav" class="room-nav-container">
        </div>

        <div id="deviceList" class="device-grid">
            <p><em>Loading devices...</em></p>
        </div>
    </main>

    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h3>Delete Device</h3>

            <p class="modal-subtitle">Are you sure you want to delete this device?</p>

            <input type="hidden" id="deleteIdField">

            <div class="modal-actions">
                <button class="primary-btn secondary-btn" onclick="closeModal()">Cancel</button>
                <button class="primary-btn danger-btn" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <button class="fab-btn" onclick="openAddModal()">+</button>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Add New Device</h3>

            <input type="hidden" id="editing-device-id">

            <div class="input-group">
                <label for="device-type">Device Type</label>
                <select id="device-type">
                    <option value="light">Light</option>
                    <option value="ac">AC</option>
                    <option value="doorlock">Door Lock</option>
                </select>
            </div>

            <div class="input-group">
                <label for="device-name">Device Name</label>
                <input type="text" id="device-name" placeholder="Device Name (e.g. Lamp)" autocomplete="off">
            </div>

            <div class="input-group">
                <label for="device-room">Room Name</label>
                <input type="text" id="device-room" placeholder="Room Name (e.g. Bedroom)" autocomplete="off">
            </div>

            <div class="modal-actions">
                <button class="primary-btn secondary-btn" onclick="closeAddModal()">Cancel</button>
                <button class="primary-btn btn-on" onclick="saveDevice()">Save</button>
            </div>
        </div>
    </div>
    <div class="panel-content" id="control-device-content">
        <div id="deviceControlPanel" class="slide-up-panel">

            <div class="panel-header">
                <button class="back-btn" onclick="closeDeviceControl()">← Back</button>
                <h2 id="control-device-name">Device Name</h2>
                <div class="header-spacer"></div>
            </div>

            <div class="panel-content" id="control-device-content">
                <div id="panel-light" class="device-panel hidden">
                    <div class="settings-group">
                        <h3>Brightness</h3>
                        <input type="range" min="1" max="100" value="100" class="full-width-slider"
                            id="brightness-slider">
                        <p class="slider-value-text">Level: <span id="brightness-display">100</span>%</p>
                    </div>
                </div>

                <div id="panel-ac" class="device-panel hidden">
                    <div class="settings-group">
                        <h3>Temperature</h3>
                        <div class="temp-control-wrapper">
                            <button class="secondary-btn temp-btn">-</button>
                            <h2 class="temp-display">22°C</h2>
                            <button class="secondary-btn temp-btn">+</button>
                        </div>
                    </div>
                </div>

                <div id="panel-doorlock" class="device-panel hidden">
                    <div class="settings-group">
                        <h3>Security</h3>
                        <button class="primary-btn danger-btn full-width-btn">Unlock Door</button>
                    </div>
                </div>

                <div id="panel-unknown" class="device-panel hidden">
                    <p>No advanced settings available for this device type.</p>
                </div>
                <div class="panel-footer">
                    <button class="primary-btn btn-on" onclick="savePanelSettings()">Save
                        Settings</button>
                </div>
            </div>

        </div>
        <div id="toast-container"></div>
        <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
